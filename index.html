<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laboratório da Equação</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ====== COMPONENTE PRINCIPAL ======
    function App() {
      const [tab, setTab] = useState('teoria');
      
      return (
        <div className="min-h-screen bg-slate-50">
          {/* CABEÇALHO */}
          <header className="bg-indigo-600 text-white p-4 shadow-lg">
            <div className="max-w-4xl mx-auto flex items-center gap-3">
              <span className="text-3xl">⚖️</span>
              <div>
                <h1 className="text-xl font-bold">Laboratório da Equação</h1>
                <p className="text-sm text-indigo-200">Aprende Álgebra de forma visual</p>
              </div>
            </div>
          </header>

          {/* MENU */}
          <nav className="bg-white border-b p-2 flex gap-2 justify-center flex-wrap">
            {[
              ['teoria', '📖 Teoria'],
              ['balanca', '⚖️ Balança'],
              ['exercicios', '✅ Exercícios'],
              ['calculadora', '🧮 Calculadora']
            ].map(([id, label]) => (
              <button
                key={id}
                onClick={() => setTab(id)}
                className={`px-4 py-2 rounded-lg text-sm font-medium transition ${
                  tab === id ? 'bg-indigo-100 text-indigo-700' : 'hover:bg-slate-100'
                }`}
              >
                {label}
              </button>
            ))}
          </nav>

          {/* CONTEÚDO */}
          <main className="max-w-4xl mx-auto p-4">
            {tab === 'teoria' && <Teoria />}
            {tab === 'balanca' && <Balança />}
            {tab === 'exercicios' && <Exercicios />}
            {tab === 'calculadora' && <Calculadora />}
          </main>
        </div>
      );
    }

    // ====== TEORIA ======
    function Teoria() {
      return (
        <div className="bg-white p-6 rounded-xl shadow">
          <h2 className="text-2xl font-bold text-indigo-600 mb-4">📖 O que é uma Equação?</h2>
          <p className="text-slate-700 mb-4">
            Uma <strong>equação</strong> é uma igualdade matemática que contém uma ou mais incógnitas.
          </p>
          <div className="bg-indigo-50 p-4 rounded-lg border-l-4 border-indigo-500 mb-4">
            <p className="font-bold text-indigo-900">Exemplo: <code className="bg-white px-2 py-1 rounded">x + 3 = 8</code></p>
            <p className="text-sm text-indigo-700">O valor de x que torna a igualdade verdadeira é <strong>5</strong></p>
          </div>
          
          <h3 className="font-bold text-lg mt-6 mb-3">✨ Regras de Ouro</h3>
          <ul className="space-y-2">
            <li className="flex gap-3"><span className="text-indigo-600 font-bold">1.</span> O que fizeres de um lado, faz do outro</li>
            <li className="flex gap-3"><span className="text-indigo-600 font-bold">2.</span> Usa operações inversas (soma ↔ subtração, multiplicação ↔ divisão)</li>
          </ul>
          
          <div className="mt-6 bg-emerald-50 p-4 rounded-lg border border-emerald-200">
            <p className="text-sm text-emerald-800 font-bold">🎯 Objetivo: Isolar o x!</p>
          </div>
        </div>
      );
    }

    // ====== BALANÇA ======
    function Balança() {
      const [x, setX] = useState(1);
      const [num, setNum] = useState(3);
      const [total, setTotal] = useState(7);
      
      const valorX = total - num;
      
      return (
        <div className="bg-white p-6 rounded-xl shadow">
          <h2 className="text-2xl font-bold text-indigo-600 mb-4">⚖️ Laboratório da Balança</h2>
          
          <div className="text-center mb-6">
            <div className="text-3xl font-mono font-bold">
              {x}x + {num} = {total}
            </div>
            <p className="text-sm text-slate-500 mt-2">x = <strong className="text-emerald-600">{valorX}</strong></p>
          </div>
          
          <div className="flex justify-center gap-8 mb-6">
            <div className="text-center">
              <div className="bg-emerald-100 p-4 rounded-lg border-2 border-emerald-300">
                <div className="text-2xl">
                  {Array(x).fill('📦').join('')}
                  {Array(num).fill('🔵').join('')}
                </div>
              </div>
              <p className="text-xs text-slate-500 mt-1">Lado Esquerdo</p>
            </div>
            
            <div className="text-3xl text-slate-400">=</div>
            
            <div className="text-center">
              <div className="bg-emerald-100 p-4 rounded-lg border-2 border-emerald-300">
                <div className="text-2xl">
                  {Array(total).fill('🔵').join('')}
                </div>
              </div>
              <p className="text-xs text-slate-500 mt-1">Lado Direito</p>
            </div>
          </div>
          
          <div className="flex gap-4 justify-center flex-wrap">
            <button onClick={() => setNum(n => n + 1)} className="bg-slate-200 px-4 py-2 rounded-lg hover:bg-slate-300">➕ Adicionar número</button>
            <button onClick={() => setNum(n => Math.max(0, n - 1))} className="bg-slate-200 px-4 py-2 rounded-lg hover:bg-slate-300">➖ Remover número</button>
            <button onClick={() => setTotal(t => t + 1)} className="bg-slate-200 px-4 py-2 rounded-lg hover:bg-slate-300">➕ Adicionar total</button>
            <button onClick={() => setTotal(t => Math.max(0, t - 1))} className="bg-slate-200 px-4 py-2 rounded-lg hover:bg-slate-300">➖ Remover total</button>
            <button onClick={() => { setNum(0); setTotal(4); setX(1); }} className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">🔄 Reset</button>
          </div>
          
          <div className="mt-6 bg-amber-50 p-4 rounded-lg border border-amber-200">
            <p className="text-sm text-amber-800">💡 Dica: O valor de x é {total} - {num} = <strong className="text-emerald-600">{valorX}</strong></p>
          </div>
        </div>
      );
    }

    // ====== EXERCÍCIOS ======
    function Exercicios() {
      const [resposta, setResposta] = useState('');
      const [feedback, setFeedback] = useState(null);
      const [equacao, setEquacao] = useState({ texto: 'x + 3 = 8', solucao: 5 });
      const [acertos, setAcertos] = useState(0);
      const [erros, setErros] = useState(0);

      const gerarEquacao = () => {
        const a = Math.floor(Math.random() * 5) + 2;
        const b = Math.floor(Math.random() * 5) + 1;
        const x = Math.floor(Math.random() * 5) + 1;
        const tipo = Math.floor(Math.random() * 2);
        
        if (tipo === 0) {
          setEquacao({ texto: `x + ${b} = ${x + b}`, solucao: x });
        } else {
          setEquacao({ texto: `${a}x = ${a * x}`, solucao: x });
        }
        setResposta('');
        setFeedback(null);
      };

      const verificar = () => {
        const val = parseFloat(resposta);
        if (val === equacao.solucao) {
          setFeedback({ tipo: 'acerto', msg: '✅ Excelente! Acertaste!' });
          setAcertos(a => a + 1);
        } else {
          setFeedback({ tipo: 'erro', msg: '❌ Quase! Tenta de novo.' });
          setErros(e => e + 1);
        }
      };

      useEffect(() => {
        gerarEquacao();
      }, []);

      return (
        <div className="bg-white p-6 rounded-xl shadow">
          <h2 className="text-2xl font-bold text-indigo-600 mb-4">✅ Desafio Prático</h2>
          
          <div className="text-center mb-6">
            <div className="text-4xl font-mono font-bold text-slate-800 bg-slate-100 p-6 rounded-lg">
              {equacao.texto}
            </div>
            <p className="text-sm text-slate-500 mt-2">Encontra o valor de x</p>
          </div>
          
          <div className="flex gap-4 justify-center flex-wrap">
            <input
              type="number"
              value={resposta}
              onChange={(e) => setResposta(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && verificar()}
              placeholder="Digite a resposta..."
              className="border-2 border-slate-200 rounded-lg px-4 py-2 w-40 text-center text-lg font-mono focus:border-indigo-500 outline-none"
            />
            <button onClick={verificar} className="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Confirmar</button>
            <button onClick={gerarEquacao} className="bg-emerald-600 text-white px-6 py-2 rounded-lg hover:bg-emerald-700">Nova Equação</button>
          </div>
          
          {feedback && (
            <div className={`mt-4 p-4 rounded-lg text-center font-bold ${
              feedback.tipo === 'acerto' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'
            }`}>
              {feedback.msg}
            </div>
          )}
          
          <div className="mt-4 flex justify-center gap-6 text-sm text-slate-600">
            <span>✅ Acertos: {acertos}</span>
            <span>❌ Erros: {erros}</span>
          </div>
        </div>
      );
    }

    // ====== CALCULADORA ======
    function Calculadora() {
      const [input, setInput] = useState('2x + 4 = 10');
      const [resultado, setResultado] = useState(null);
      const [erro, setErro] = useState('');

      const resolver = () => {
        setErro('');
        setResultado(null);
        try {
          const eq = input.replace(/\s/g, '');
          const [esq, dir] = eq.split('=');
          
          const parse = (expr) => {
            let x = 0, n = 0;
            const termos = expr.match(/[+-]?[0-9]*x|[+-]?[0-9]+/g) || [];
            termos.forEach(t => {
              if (t.includes('x')) {
                let c = t.replace('x', '');
                if (c === '' || c === '+') c = '1';
                if (c === '-') c = '-1';
                x += parseFloat(c);
              } else {
                n += parseFloat(t);
              }
            });
            return { x, n };
          };
          
          const L = parse(esq);
          const R = parse(dir);
          const A = L.x - R.x;
          const B = L.n - R.n;
          
          if (A === 0) {
            setErro(B === 0 ? 'Infinitas soluções' : 'Equação impossível');
            return;
          }
          
          setResultado({ x: (-B / A).toFixed(2), passos: [
            `➡️ ${esq} = ${dir}`,
            `➡️ ${A}x + ${B} = 0`,
            `➡️ x = ${(-B / A).toFixed(2)}`
          ]});
        } catch {
          setErro('Formato inválido. Exemplo: 2x + 4 = 10');
        }
      };

      return (
        <div className="bg-white p-6 rounded-xl shadow">
          <h2 className="text-2xl font-bold text-indigo-600 mb-4">🧮 Calculadora Passo a Passo</h2>
          
          <div className="flex gap-3 flex-wrap">
            <input
              type="text"
              value={input}
              onChange={(e) => setInput(e.target.value)}
              className="flex-1 border-2 border-slate-200 rounded-lg px-4 py-2 font-mono focus:border-indigo-500 outline-none min-w-[200px]"
              placeholder="Ex: 2x + 4 = 10"
            />
            <button onClick={resolver} className="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Resolver</button>
          </div>
          
          <div className="mt-4">
            <button onClick={() => setInput('3x - 5 = 10')} className="text-xs text-indigo-600 hover:underline mr-3">3x - 5 = 10</button>
            <button onClick={() => setInput('5x + 3 = 2x + 12')} className="text-xs text-indigo-600 hover:underline mr-3">5x + 3 = 2x + 12</button>
            <button onClick={() => setInput('4x = 24')} className="text-xs text-indigo-600 hover:underline">4x = 24</button>
          </div>
          
          {erro && (
            <div className="mt-4 bg-rose-100 text-rose-800 p-3 rounded-lg border border-rose-200">
              ⚠️ {erro}
            </div>
          )}
          
          {resultado && (
            <div className="mt-4 bg-slate-900 text-slate-100 p-4 rounded-lg">
              <p className="font-mono text-emerald-400 text-xl mb-2">x = {resultado.x}</p>
              <div className="space-y-1 text-sm text-slate-300">
                {resultado.passos.map((p, i) => (
                  <div key={i}>{p}</div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ====== RENDERIZAR ======
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
